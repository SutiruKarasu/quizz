<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLOCK-INN QUIZ 2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-gears">
        <div class="gear gear-1"></div>
        <div class="gear gear-2"></div>
    </div>

    <div id="start-screen" class="screen active">
        <div class="login-card">
            <h1>CLOCK-INN</h1>
            <p>QUIZ 2.0 | 60 Questions. 6 Categories. 10 Seconds.<br>Precision is everything.</p>
            <input type="text" id="player-name" placeholder="Enter your name...">
            <button id="start-btn" class="answer-btn">CLOCK IN</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="phase-badge"></div>
        <div class="timer-ring">
            <span id="time-display">10</span>
            <div id="clock-hand"></div>
        </div>
        <h2 id="topic-display">TOPIC</h2>
        <p id="question-text"></p>
        <div id="answers-container"></div>
        <div style="margin-top: 20px;">Score: <span id="score-display">0</span></div>
    </div>

    <div id="event-screen">
        <h2>SHIFT COMPLETED</h2>
    </div>

    <div id="result-screen" class="screen">
        <div class="login-card">
            <h1>SHIFT ENDED</h1>
            <p>Total Score: <span id="final-score">0</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
