<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
      text-align: center;
      margin-top: 100px;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 15px;
      display: inline-block;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #ffcc00;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #ffaa00;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Quiz Night 🎉</h1>
  <p>Enter your name:</p>

  <input id="nameInput" placeholder="Your name...">
  <br>

  <button onclick="startQuiz()">Start Quiz</button>
</div>

<script src="script.js"></script>

</body>
</html>
