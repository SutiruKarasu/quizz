<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock-In Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <div class="clock-icon">🕐</div>
            <h1>Clock-In Quiz</h1>
            <p>40 Questions. 10 Seconds per question. The clock is ticking.</p>
            <input type="text" id="player-name" placeholder="Enter your name..." autocomplete="off">
            <button id="start-btn">Clock In</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="header">
                <span id="topic-display">Topic</span>
                <span id="question-counter">Question 1 / 40</span>
            </div>
            
            <div class="clock-timer" id="clock-timer">
                <div class="clock-timer-inner" id="time-display">10</div>
            </div>

            <h2 id="question-text">Loading question...</h2>
            
            <div class="answers-container" id="answers-container">
                <!-- Answer buttons generated via JS -->
            </div>
            
            <div class="footer-stats">
                Score: <span id="score-display">0</span>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <div class="clock-icon">🕰️</div>
            <h2>Shift Ended!</h2>
            <p>Well done, <span id="result-name">Player</span>!</p>
            <div class="final-score" id="final-score">0</div>
            <p>Points</p>
            <p id="mail-status" style="font-size: 0.8em; color: #888; margin-top: 15px;">Sending results to host...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
