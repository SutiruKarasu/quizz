<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock-Inn Quiz 2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container" id="main-container">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div id="streak-badge" class="streak-badge">0x STREAK</div>

        <div id="event-screen" class="event-overlay">
            <div class="event-content">
                <div class="event-gear">⚙️</div>
                <h1 id="event-title">NEW CHAPTER</h1>
                <p id="event-desc">Prepare yourself...</p>
            </div>
        </div>

        <div id="start-screen" class="screen active">
            <div class="logo-container">
                <h1 class="main-logo">
                    CL<span class="gear-logo">
                        <svg viewBox="0 0 100 100">
                            <path d="M50 0 L55 15 L70 10 L75 25 L90 20 L85 35 L100 40 L100 60 L85 65 L90 80 L75 75 L70 90 L55 85 L50 100 L45 85 L30 90 L25 75 L10 80 L15 65 L0 60 L0 40 L15 35 L10 20 L25 25 L30 10 L45 15 Z" fill="#d4af37"/>
                            <circle cx="50" cy="50" r="20" fill="#0f111a"/>
                        </svg>
                    </span>CK-INN
                </h1>
                <div class="version-tag">QUIZ 2.0</div>
            </div>
            <p>60 Questions. 6 Categories. 10 Seconds. <br><strong>Precision is everything.</strong></p>
            <input type="text" id="player-name" placeholder="Enter your name..." autocomplete="off">
            <button id="start-btn">Clock In</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div class="header">
                <span id="topic-display">Topic</span>
                <span id="question-counter">Question 1 / 60</span>
            </div>
            
            <div class="clock-container">
                <div class="clock-face">
                    <div class="gear-large">
                        <svg viewBox="0 0 100 100">
                            <path d="M50 0 L55 15 L70 10 L75 25 L90 20 L85 35 L100 40 L100 60 L85 65 L90 80 L75 75 L70 90 L55 85 L50 100 L45 85 L30 90 L25 75 L10 80 L15 65 L0 60 L0 40 L15 35 L10 20 L25 25 L30 10 L45 15 Z" fill="none" stroke="#d4af37" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="gear-small">
                        <svg viewBox="0 0 100 100">
                            <path d="M50 0 L55 15 L70 10 L75 25 L90 20 L85 35 L100 40 L100 60 L85 65 L90 80 L75 75 L70 90 L55 85 L50 100 L45 85 L30 90 L25 75 L10 80 L15 65 L0 60 L0 40 L15 35 L10 20 L25 25 L30 10 L45 15 Z" fill="none" stroke="#b5952f" stroke-width="3"/>
                        </svg>
                    </div>
                    <div class="clock-hand" id="clock-hand"></div>
                    <div class="clock-digital" id="time-display">10</div>
                </div>
            </div>

            <h2 id="question-text">Loading question...</h2>
            
            <div class="answers-container" id="answers-container">
                </div>
            
            <div class="footer-stats" id="score-wrapper">
                Score: <span id="score-display">0</span>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <div class="clock-icon">🕰️</div>
            <h2>Shift Ended!</h2>
            <p>Excellent work, <span id="result-name">Player</span>!</p>
            <div class="final-score" id="final-score">0</div>
            <p>Points</p>
            <p id="mail-status" style="font-size: 0.8em; color: #888; margin-top: 15px;">Transmitting shift report to host...</p>
            <button id="restart-btn" style="margin-top: 20px;">Clock In Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
